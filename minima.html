<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>minima</title>
</head>

<body>
    <input type="url" placeholder="URL goes here" id="inputbox">
    <button type="button" onclick="getShortened()">Shorten</button>

    <script>
        function getShortened() {
            fetch("https://minima.tuberculosis.dev/", {
                method: "POST",
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(document.getElementById("inputbox").value)
            }).then(response => {
                console.log("Response:", response);
            })
        }
    </script>
</body>
