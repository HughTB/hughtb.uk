<head>

    <title>HughTB</title>
    <style>@import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap');</style>
    <style>
        body {
            background-color: #202225;
            font-family: 'Noto Sans', sans-serif;
        }

        .header a:link {text-decoration: none; color: #FFFFFF}
        .header a:visited {text-decoration: none; color: #FFFFFF}
        .header a:hover {text-decoration: none; color: #FFFFFF}
        .header a:active {text-decoration: none; color: #FFFFFF}

        .header {
            border-radius: 20px;
            background: rgb(134,53,227);
            background: linear-gradient(90deg, rgba(134,53,227,1) 25%, rgba(0,45,100,1) 75%);
            padding: 10px;
            margin: 10px;
            margin-top: 20px;
            line-height: 20%;
            text-align: justify;
        }

        #logo {
            height: 20%;
            width: auto;
            margin: auto;
            vertical-align: middle;
            display:inline-block;
        }

        .header h1 {
            color: #000000;
            margin: auto;
            padding-left: 10px;
            vertical-align: middle;
            display: inline-block;
        }

        .header a {
            color: #000000;
            margin: auto;
            padding-left: 10px;
            vertical-align: middle;
            display: inline-block;
            font-size: xx-large;
        }

        .header-right {
            display: inline-flex;
            position: absolute;
            right: 0px;
            padding-top: calc(10vh - 5px);
            padding-right: calc(2vw + 20px);
        }

        .main {
            border-radius: 20px;
            background: #2f3136;
            padding: 10px;
            margin: 10px;
            margin-top: 20px;
            color: #FFFFFF;
            text-align: justify;
        }

        .main a:link {text-decoration: none; color: #FFFFFF}
        .main a:visited {text-decoration: none; color: #FFFFFF}
        .main a:hover {text-decoration: none; color: #FFFFFF}
        .main a:active {text-decoration: none; color: #FFFFFF}

        .sociallinks {display: inline-block; text-align: center; width: 100%}
        .sociallinks img {display: inline-block; vertical-align: middle; padding: 10px}
        .sociallinks h2 {display: inline-block; vertical-align: middle}
    </style>
</head>

<body>
    <div class="header">
        <img src="images/logo.png" id="logo">
        <h1>HughTB</h1>
        <div class="header-right">
            <a href="index.html">Home</a>
            <a href="projects.html">Projects</a>
        </div>
    </div>

    <div class="main">
        <div class="sociallinks">
            <a href="https://discord.com/users/403609667722412054/"><img src="images/discord.png" style="height: 5%; width: auto"><h2>HughTB#4507</h2></a>
            <a href="https://github.com/HughTB/"><img src="images/github.png" style="height: 5%; width: auto"><h2>HughTB</h2></a>
